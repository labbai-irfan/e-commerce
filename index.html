<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/PPD%20Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PPD — Everything for School. India's trusted educational publisher since 1926." />
    <meta name="theme-color" content="#FDF1E1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1712" media="(prefers-color-scheme: dark)" />
    <title>PPD — Everything for School</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before first paint to avoid a flash of the wrong theme.
      ;(function () {
        try {
          var theme = localStorage.getItem('ppd:theme') || 'light'
          var dark =
            theme === 'dark' ||
            (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
